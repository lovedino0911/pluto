<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행성 재판 체험 (Planet Trial)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
    <!-- 1. Background Animation -->
    <div class="stars-container" id="stars"></div>

    <div id="app">
        <!-- 2. Intro View: 학번 입력 -->
        <div id="view-intro" class="view active">
            <div class="glass-card">
                <h1>행성 재판 체험</h1>
                <p>당신은 이제 우주 법정의 판사입니다.<br>천체들이 '행성'의 자격이 있는지 IAU 기준에 따라 판결을 내려주세요.</p>
                <div class="input-group">
                    <input type="text" id="student-id" placeholder="학번을 입력하세요 (예: 20401)" maxlength="10">
                </div>
                <button class="btn" onclick="startApp()">재판 시작하기</button>
            </div>
        </div>

        <!-- 3. Planet Selection View -->
        <div id="view-selection" class="view">
            <div class="glass-card">
                <h2>행성 판결하기</h2>
                <p>천체를 선택하여 '행성' 여부를 심사하세요.</p>
                <div class="planet-list" id="planet-list">
                    <!-- Planet items injected via JS -->
                </div>
                <div style="margin-top: 25px;">
                    <button class="btn" id="btn-final-verdict" onclick="showFinalResult()" style="display: none; background: #2ecc71;">최종 결과 확인하기</button>
                </div>
            </div>
        </div>

        <!-- 4. Quiz View -->
        <div id="view-quiz" class="view">
            <div class="glass-card">
                <div class="quiz-header">
                    <div class="planet-preview-container">
                        <img id="quiz-planet-img" src="" alt="천체 이미지" class="planet-preview-img">
                    </div>
                    <h2 id="quiz-planet-name">천체 이름</h2>
                </div>
                
                <div class="question-card">
                    <p class="question-text">1. 이 천체는 태양을 공전합니까?</p>
                    <div class="option-group">
                        <button class="option-btn" onclick="selectOption(this, 0, true)">예</button>
                        <button class="option-btn" onclick="selectOption(this, 0, false)">아니오</button>
                    </div>
                </div>

                <div class="question-card" style="margin-top: 20px;">
                    <p class="question-text">2. 충분한 질량으로 구형을 유지합니까?</p>
                    <div class="option-group">
                        <button class="option-btn" onclick="selectOption(this, 1, true)">예</button>
                        <button class="option-btn" onclick="selectOption(this, 1, false)">아니오</button>
                    </div>
                </div>

                <div class="question-card" style="margin-top: 20px;">
                    <p class="question-text">3. 궤도 주변의 다른 천체를 지배(청소)했습니까?</p>
                    <div class="option-group">
                        <button class="option-btn" onclick="selectOption(this, 2, true)">예</button>
                        <button class="option-btn" onclick="selectOption(this, 2, false)">아니오</button>
                    </div>
                </div>

                <button class="btn" onclick="submitTrial()" style="margin-top: 20px;">판결 완료</button>
                <button class="btn" onclick="goBack()" style="margin-top: 10px; background: none; border: 1px solid var(--glass-border);">이전으로</button>
            </div>
        </div>

        <!-- 5. Explanation Modal -->
        <div id="modal-verdict" class="modal-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center;">
            <div class="glass-card" style="max-width: 420px; border-color: var(--primary-glow);">
                <h2 id="modal-title" style="margin-bottom: 20px;">판결 가이드</h2>
                <p id="modal-desc" style="color: #fff; line-height: 1.7; margin-bottom: 25px;"></p>
                <button class="btn" onclick="closeModal()">확인</button>
            </div>
        </div>

        <!-- 6. Result View -->
        <div id="view-result" class="view">
            <div class="glass-card">
                <h1>최종 판결 결과</h1>
                <p id="result-student-info" style="font-weight: bold; font-size: 1.1rem;">학번: </p>
                <div class="result-score" id="result-score">0 / 8</div>
                <p id="result-comment">천문학 지식이 풍부하시군요!</p>
                
                <!-- 100% Score Only Award -->
                <div id="snack-award" class="snack-message">
                    <h3>🍬 간식 당첨! 🍬</h3>
                    <p>모든 판결을 정확하게 내렸습니다.<br><strong>추후 간식 증정해드립니다</strong></p>
                </div>

                <button class="btn" onclick="restartApp()" style="margin-top: 20px; background: #636e72;">처음으로</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
