<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행성 재판 체험 (Planet Trial)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
    <!-- 배경 별빛 (CSS로 생성됨) -->
    <div class="stars-bg"></div>

    <div id="app">
        <!-- 1. 메인 화면 -->
        <div id="view-intro" class="view active">
            <div class="glass-card">
                <h1>행성 재판 체험</h1>
                <p>당신은 이제 우주 법정의 판사입니다.<br>천체들이 행성 자격이 있는지 판결해 주세요.</p>
                <div class="input-group">
                    <input type="text" id="student-id" placeholder="학번을 입력하세요 (예: 20401)" maxlength="10">
                </div>
                <button class="btn" onclick="startApp()">재판 시작하기</button>
            </div>
        </div>

        <!-- 2. 행성 선택 목록 -->
        <div id="view-selection" class="view">
            <div class="glass-card">
                <h2>행성 판결하기</h2>
                <p>판결할 천체를 선택하세요.</p>
                <div id="planet-list" class="planet-list"></div>
                <button id="btn-final-verdict" class="btn" style="display:none; margin-top:20px; background:#4cd137;" onclick="showFinalResult()">최종 판결문 제출</button>
            </div>
        </div>

        <!-- 3. 판결 진행 화면 -->
        <div id="view-quiz" class="view">
            <div class="glass-card">
                <div class="planet-preview-container">
                    <img id="quiz-planet-img" src="" alt="" class="planet-preview-img">
                </div>
                <h2 id="quiz-planet-name"></h2>
                <div id="quiz-container"></div>
                <button class="btn" onclick="submitTrial()">판결 확정</button>
                <button class="btn" onclick="goBack()" style="background:#555; margin-top:10px;">목록으로</button>
            </div>
        </div>

        <!-- 4. 최종 결과 화면 -->
        <div id="view-result" class="view">
            <div class="glass-card">
                <h2>전체 판결 결과</h2>
                <div id="result-score" style="font-size:3.5rem; color:#00d2ff; margin:20px 0;">0 / 8</div>
                <p id="result-comment"></p>
                <button class="btn" onclick="location.reload()">처음부터 다시 하기</button>
            </div>
        </div>

        <!-- 결과 모달 -->
        <div id="modal-verdict" class="modal-overlay">
            <div class="glass-card modal-content">
                <h2 id="modal-title"></h2>
                <p id="modal-desc" style="margin:20px 0; line-height:1.6;"></p>
                <button class="btn" onclick="closeModal()">확인</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
