<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행성 재판 체험 (Planet Trial)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container" id="stars"></div>
    
    <div id="app">
        <!-- 1. Intro View -->
        <div id="view-intro" class="view active">
            <div class="glass-card">
                <h1>행성 재판 체험</h1>
                <p>당신은 이제 우주 법정의 판사입니다.<br>천체들이 '행성'의 자격이 있는지 IAU 기준에 따라 판결을 내려주세요.</p>
                <div class="input-group">
                    <input type="text" id="student-id" placeholder="학번을 입력하세요 (예: 20401)" maxlength="10">
                </div>
                <button class="btn" onclick="startApp()">재판 시작하기</button>
            </div>
        </div>

        <!-- 2. Planet Selection View -->
        <div id="view-selection" class="view">
            <div class="glass-card">
                <h2>행성 판결하기</h2>
                <p>판결을 내릴 천체를 선택하세요.</p>
                <div class="planet-list" id="planet-list"></div>
                <button id="btn-final-verdict" class="btn" style="display:none; margin-top: 20px; background: #4cd137;" onclick="showFinalResult()">최종 판결문 제출</button>
            </div>
        </div>

        <!-- 3. Quiz View -->
        <div id="view-quiz" class="view">
            <div class="glass-card">
                <div class="quiz-header">
                    <div class="planet-preview-container">
                        <img id="quiz-planet-img" src="" alt="행성 이미지" class="planet-preview-img">
                    </div>
                    <h2 id="quiz-planet-name">천체 이름</h2>
                </div>
                
                <div class="question-card">
                    <span class="question-text">1. 태양을 공전하는가?</span>
                    <div class="option-group">
                        <button class="option-btn" onclick="selectOption(0, true)">예</button>
                        <button class="option-btn" onclick="selectOption(0, false)">아니오</button>
                    </div>
                </div>

                <div class="question-card">
                    <span class="question-text">2. 충분한 질량으로 구형을 유지하는가?</span>
                    <div class="option-group">
                        <button class="option-btn" onclick="selectOption(1, true)">예</button>
                        <button class="option-btn" onclick="selectOption(1, false)">아니오</button>
                    </div>
                </div>

                <div class="question-card">
                    <span class="question-text">3. 궤도 주변의 다른 천체를 지배하는가?</span>
                    <div class="option-group">
                        <button class="option-btn" onclick="selectOption(2, true)">예</button>
                        <button class="option-btn" onclick="selectOption(2, false)">아니오</button>
                    </div>
                </div>

                <button class="btn" onclick="submitTrial()" style="margin-top: 10px;">판결 내리기</button>
                <button class="btn" onclick="goBack()" style="margin-top: 10px; background: #636e72;">목록으로</button>
            </div>
        </div>

        <!-- 4. Result View -->
        <div id="view-result" class="view">
            <div class="glass-card">
                <h2>전체 판결 결과</h2>
                <div id="result-student-info" style="margin-bottom: 10px; font-weight: bold;"></div>
                <div class="result-score" id="result-score">0 / 8</div>
                <p id="result-comment">훌륭한 판결입니다!</p>
                
                <div id="snack-award" class="snack-badge">
                    <span>🍭 간식 당첨! 🍭</span>
                    <p>축하합니다! 완벽한 판결로 간식 교환권을 획득하셨습니다!</p>
                </div>
                
                <button class="btn" onclick="restartApp()" style="margin-top: 20px;">처음으로</button>
            </div>
        </div>

        <!-- Verdict Modal -->
        <div id="modal-verdict" class="modal-overlay">
            <div class="modal-content glass-card">
                <h2 id="modal-title">판결 결과</h2>
                <p id="modal-desc"></p>
                <button class="btn" onclick="closeModal()">확인</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
